stages:
  - stage: Build
    displayName: Build Stage
    jobs:
      - job : BuildJob
        displayName: Build Job 1    
        pool:
          vmImage: 'Ubuntu-22.04'
        steps:
        - task: NodeTool@0
          inputs:
            versionSpec: '25.x'
        - script: |
            npm install -g @angular/cli
            npm install
            ng build --configuration=production
          displayName: 'npm install and build'
        - script: |
           npm pack
          displayName: 'Package for npm release'
        - task: ArchiveFiles@2
          displayName: 'Archive files'
          inputs:
            rootFolderOrFile: '$(System.DefaultWorkingDirectory)/dist'
            includeRootFolder: false
            archiveType: zip
            archiveFile: $(Build.ArtifactStagingDirectory)/wbfe.zip
            replaceExistingArchive: true
        - upload: $(Build.ArtifactStagingDirectory)/wbfe.zip
          artifact: drop
        - task: CopyFiles@2
          inputs:
            SourceFolder: '$(System.DefaultWorkingDirectory)/dist'
            Contents: '**'
            TargetFolder: '$(Build.ArtifactStagingDirectory)/wbfe'
            CleanTargetFolder: true
            OverWrite: true

