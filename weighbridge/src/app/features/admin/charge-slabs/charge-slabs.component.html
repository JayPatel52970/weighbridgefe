<div class="mb-3"><h1 class="h3"><i class="bi bi-coin me-2"></i>Charge Slabs</h1></div>

<div class="card">
  <div class="card-header">
    <button class="btn btn-primary" (click)="openForm()">
      <i class="bi bi-plus me-1"></i>Add Slab
    </button>
  </div>

  @if (showForm) {
    <div class="card-body border-bottom">
      @if (error) { <div class="alert alert-danger">{{ error }}</div> }
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label">From Weight (kg)</label>
          <input type="number" class="form-control" [(ngModel)]="form.fromWeight" min="0">
        </div>
        <div class="col-md-3">
          <label class="form-label">To Weight (kg)</label>
          <input type="number" class="form-control" [(ngModel)]="form.toWeight" min="1">
        </div>
        <div class="col-md-3">
          <label class="form-label">Charge Amount (₹)</label>
          <input type="number" class="form-control" [(ngModel)]="form.chargeAmount" min="0">
        </div>
        <div class="col-md-3">
          <div class="d-flex gap-2">
            <button class="btn btn-success" (click)="save()" [disabled]="saving">
              <i class="bi bi-save me-1"></i>Save
            </button>
            <button class="btn btn-secondary" (click)="showForm = false">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  }

  <div class="card-body p-0">
    @if (loading) {
      <div class="text-center p-4"><div class="spinner-border text-primary"></div></div>
    } @else {
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr><th>From (kg)</th><th>To (kg)</th><th>Charge (₹)</th><th></th></tr>
        </thead>
        <tbody>
          @for (s of slabs; track s.id) {
            <tr>
              <td>{{ s.fromWeight | number }}</td>
              <td>{{ s.toWeight | number }}</td>
              <td>₹{{ s.chargeAmount | number }}</td>
              <td>
                <button class="btn btn-sm btn-info me-1" (click)="openForm(s)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-danger" (click)="delete(s)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          } @empty {
            <tr><td colspan="4" class="text-center text-muted py-4">No charge slabs configured</td></tr>
          }
        </tbody>
      </table>
    }
  </div>
</div>
