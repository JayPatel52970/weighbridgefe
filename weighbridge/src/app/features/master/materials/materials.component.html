<div class="mb-3"><h1 class="h3"><i class="bi bi-box me-2"></i>Materials Master</h1></div>

<div class="card">
  <div class="card-header">
    <div class="row g-2 align-items-center">
      <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Search materials…"
               [(ngModel)]="search" (ngModelChange)="load()">
      </div>
      <div class="col-md-6 text-end">
        <button class="btn btn-primary" (click)="showForm = !showForm; error = ''">
          <i class="bi bi-plus me-1"></i>Add Material
        </button>
      </div>
    </div>
  </div>

  @if (showForm) {
    <div class="card-body border-bottom">
      @if (error) { <div class="alert alert-danger">{{ error }}</div> }
      <div class="row g-2">
        <div class="col-md-4">
          <div class="input-group">
            <input type="text" class="form-control" placeholder="Material name" [(ngModel)]="newName">
            <button class="btn btn-success" (click)="save()" [disabled]="saving">
              <i class="bi bi-save me-1"></i>Save
            </button>
            <button class="btn btn-secondary" (click)="showForm = false">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  }

  <div class="card-body p-0">
    @if (loading) {
      <div class="text-center p-4"><div class="spinner-border text-primary"></div></div>
    } @else {
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>#</th><th>Name</th><th></th></tr></thead>
        <tbody>
          @for (m of materials; track m.id; let i = $index) {
            <tr>
              <td>{{ i + 1 }}</td>
              <td><strong>{{ m.name }}</strong></td>
              <td>
                <button class="btn btn-sm btn-danger" (click)="delete(m)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          } @empty {
            <tr><td colspan="3" class="text-center text-muted py-4">No materials found</td></tr>
          }
        </tbody>
      </table>
    }
  </div>
</div>
