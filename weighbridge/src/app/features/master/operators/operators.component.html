<div class="mb-3"><h1 class="h3"><i class="bi bi-person-badge me-2"></i>Operators</h1></div>

<div class="card">
  <div class="card-header">
    <div class="row g-2 align-items-center">
      <div class="col-md-6">
        <div class="input-group">
          <input type="text" class="form-control" placeholder="Filter operators…"
                 [(ngModel)]="filterText" (ngModelChange)="applyFilter()">
          <button class="btn btn-outline-secondary" (click)="applyFilter()"><i class="bi bi-search"></i></button>
        </div>
      </div>
      <div class="col-md-6 text-end">
        <button class="btn btn-primary" (click)="openAdd()">
          <i class="bi bi-plus me-1"></i>Add Operator
        </button>
      </div>
    </div>
  </div>

  <div class="card-body p-0">
    @if (loading) {
      <div class="text-center p-4"><div class="spinner-border text-primary"></div></div>
    } @else {
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Name</th>
              <th>Created</th>
              <th style="width:90px"></th>
            </tr>
          </thead>
          <tbody>
            @for (o of filtered; track o.id) {
              <tr>
                <td><strong>{{ o.name }}</strong></td>
                <td class="text-muted small">{{ o.createdAt | date:'dd MMM yyyy' }}</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary me-1" (click)="openEdit(o)" title="Edit">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button class="btn btn-sm btn-danger" (click)="delete(o)" title="Delete">
                    <i class="bi bi-trash"></i>
                  </button>
                </td>
              </tr>
            } @empty {
              <tr><td colspan="3" class="text-center text-muted py-4">No operators found</td></tr>
            }
          </tbody>
        </table>
      </div>
    }
  </div>
</div>

@if (showModal) {
  <div class="cm-back" (click)="closeModal()">
    <div class="cm-card" (click)="$event.stopPropagation()">

      <div class="cm-head">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-person-badge-fill fs-5"></i>
          <div class="fw-bold">{{ isEdit ? 'Edit Operator' : 'Add Operator' }}</div>
          <button type="button" class="btn-close btn-close-white ms-auto" (click)="closeModal()"></button>
        </div>
      </div>

      <div class="cm-body">
        <form (ngSubmit)="save()" autocomplete="off">

          @if (modalError) {
            <div class="alert alert-danger py-2">{{ modalError }}</div>
          }

          <div class="mb-3">
            <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
            <input id="fld-opName" type="text" class="form-control"
                   placeholder="Operator name"
                   [(ngModel)]="formName" name="name"
                   (keydown.escape)="closeModal()">
          </div>

          <div class="cm-foot">
            <button type="button" class="btn btn-secondary btn-sm" (click)="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary btn-sm" [disabled]="saving">
              @if (saving) {
                <span class="spinner-border spinner-border-sm me-1"></span>Saving…
              } @else {
                <i class="bi bi-save me-1"></i>{{ isEdit ? 'Update' : 'Create' }}
              }
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>
}

<style>
  .cm-back { position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:1055; display:flex; align-items:center; justify-content:center; }
  .cm-card { background:#fff; border-radius:12px; width:400px; max-width:94vw; box-shadow:0 24px 64px rgba(0,0,0,.4); overflow:hidden; }
  .cm-head { background:linear-gradient(135deg,#0d6efd 0%,#0943a3 100%); color:#fff; padding:16px 20px; }
  .cm-body { padding:20px; }
  .cm-foot { display:flex; gap:8px; justify-content:flex-end; padding-top:12px; border-top:1px solid #e5e7eb; }
</style>
