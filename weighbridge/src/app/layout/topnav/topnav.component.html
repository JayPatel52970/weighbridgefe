<nav class="app-header navbar navbar-expand bg-body">
  <div class="container-fluid">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
          <i class="bi bi-list fs-5"></i>
        </a>
      </li>
    </ul>

    <ul class="navbar-nav ms-auto">
      @if (profile; as p) {
        <li class="nav-item">
          <span class="nav-link">
            <i class="bi bi-person-circle me-1"></i>
            <strong>{{ p.username }}</strong>
            @for (r of p.roles; track r) {
              <span class="badge bg-primary ms-1">{{ r }}</span>
            }
          </span>
        </li>
      }
      <li class="nav-item">
        <a class="nav-link text-danger" href="#" (click)="$event.preventDefault(); openLogout()">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
      </li>
    </ul>
  </div>
</nav>

@if (showLogoutDialog) {
  <div class="modal fade show d-block" tabindex="-1" style="background:rgba(0,0,0,.5)" role="dialog">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Logout</h5>
          <button type="button" class="btn-close" (click)="cancelLogout()" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="hardLogout" [(ngModel)]="hardLogout">
            <label class="form-check-label" for="hardLogout">
              Hard logout (clear all saved profiles)
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" (click)="cancelLogout()">Cancel</button>
          <button type="button" class="btn btn-danger btn-sm" (click)="confirmLogout()">Logout</button>
        </div>
      </div>
    </div>
  </div>
}
