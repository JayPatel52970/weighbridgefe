<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Weighbridge</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

  <!-- Splash screen loader: covers app immediately, logo fades in, then whole screen fades out -->
  <style>
    /* Container: visible from frame 0, fades out only at the end */
    @keyframes splashOut {
      0%,75% { opacity: 1; }
      100%    { opacity: 0; }
    }
    /* Logo: fades + scales in during first third */
    @keyframes logoIn {
      0%   { opacity: 0; transform: scale(0.88); }
      33%  { opacity: 1; transform: scale(1); }
      100% { opacity: 1; transform: scale(1); }
    }
    #splash {
      position: fixed; inset: 0; z-index: 99999;
      background: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      animation: splashOut 3s ease forwards;
    }
    #splash img {
      max-width: 480px; max-height: 320px; object-fit: contain;
      animation: logoIn 3s ease forwards;
    }
    #splash .splash-tagline {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px; color: #6b7280; letter-spacing: 0.03em;
      animation: logoIn 3s ease forwards;
    }
    #splash .splash-loading {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; color: #9ca3af; letter-spacing: 0.12em; text-transform: uppercase;
      animation: logoIn 3s ease forwards;
    }
  </style>
  <div id="splash">
    <img src="/dweck_logo.png" alt="">
    <div class="splash-tagline">Enterprise Software powered by Dweck</div>
    <div class="splash-loading">Loading&hellip;</div>
  </div>
  <script>setTimeout(function(){ var s=document.getElementById('splash'); if(s) s.remove(); }, 3050);</script>

  <div id="google_translate_element" style="position:fixed;top:8px;right:160px;z-index:9999;"></div>
  <app-root></app-root>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }

    // Prevent Google Translate from doing a full page reload in this SPA.
    // When a language is selected, GT sets the googtrans cookie then calls
    // location.reload(). We intercept that reload and re-init the widget
    // in-place instead — the cookie is already set so GT translates the DOM.
    (function () {
      var _nativeReload = window.location.reload.bind(window.location);
      var _gtChanging = false;

      document.addEventListener('DOMContentLoaded', function () {
        new MutationObserver(function () {
          var sel = document.querySelector('#google_translate_element select');
          if (sel && !sel._gtWatched) {
            sel._gtWatched = true;
            sel.addEventListener('change', function () {
              _gtChanging = true;
              setTimeout(function () { _gtChanging = false; }, 1500);
            });
          }
        }).observe(document.getElementById('google_translate_element'), { childList: true, subtree: true });
      });

      try {
        Object.defineProperty(window.location, 'reload', {
          configurable: true,
          writable: true,
          value: function () {
            if (_gtChanging) {
              _gtChanging = false;
              var el = document.getElementById('google_translate_element');
              if (el) { el.innerHTML = ''; googleTranslateElementInit(); }
            } else {
              _nativeReload();
            }
          }
        });
      } catch (e) { /* browser may not allow overriding location.reload */ }
    })();
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
